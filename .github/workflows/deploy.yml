name: Deploy AlloSupport.ma

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            .next/ public/ package.json package-lock.json next.config.js \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/

      - name: Restart PM2
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "cd ${{ secrets.VPS_APP_DIR }} && \
               npm ci --omit=dev && \
               export NVM_DIR=/home/brahim/.nvm && \
               source /home/brahim/.nvm/nvm.sh && \
               pm2 delete allosupport 2>/dev/null || true && \
               pm2 start node_modules/.bin/next \
                 --name 'allosupport' \
                 --interpreter none \
                 -- start && \
               pm2 save"

      - name: Health check
        run: |
          sleep 8
          curl -f https://allosupport.ma || exit 1
